# PAC-Former on TUEV (6-class event). Run scripts/preprocess_tuev.py first --
# this expects its output layout (data_root/processed_train|processed_eval).
mixer: mi              # attention | cotar | mi

# data
dataset: tuev
data_root: /scratch/zz5070/PAC-former/tuh_eeg/v2.0.1/edf
n_channels: 16
seq_len: 1000           # 5s @ 200Hz after BIOT's resample, matches TUEVLoader
sample_rate: 200
sampling_rate: 200
num_classes: 6

# model  (TeCh-aligned: bigger backbone + more band tokens so the mixer has leverage)
n_bands: 32
d_model: 128
depth: 6
dropout: 0.2
kernel_size: 201
patch_len: 200       # time-patch length for the band tokenizer (P = seq_len/patch_len patches per band)

# training  (TeCh-aligned: lower lr, more epochs + early stopping, augmentation)
batch_size: 64
epochs: 50
eval_every: 1     # run validation every N epochs
patience: 12      # early stop after this many evals without val improvement
lr: 0.0001
weight_decay: 0.0001
augmentations: [jitter0.1, frequency0.2, mask0.2, channel0.1, drop0.2]
num_workers: 8
seed: 0
device: cuda
