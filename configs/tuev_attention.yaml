# PAC-Former on TUEV (6-class event). Run scripts/preprocess_tuev.py first --
# this expects its output layout (data_root/processed_train|processed_eval).
mixer: attention      # attention | cotar | mi

# data
dataset: tuev
data_root: /scratch/zz5070/PAC-former/tuh_eeg/v2.0.1/edf
n_channels: 16
seq_len: 1000           # 5s @ 200Hz after BIOT's resample, matches TUEVLoader
sample_rate: 200
sampling_rate: 200
num_classes: 6

# model
n_bands: 12
d_model: 64
depth: 4
dropout: 0.1
kernel_size: 201

# training
batch_size: 32
epochs: 20
eval_every: 1     # run validation every N epochs
lr: 0.001
weight_decay: 0.00001
num_workers: 4
seed: 0
device: cuda
